name: Assignment 6 ML Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: "Optional accuracy override for demo runs (e.g., 0.80 or 0.90)"
        required: false
        default: ""
      force_train_fail:
        description: "Set to true to force the validate job to fail"
        required: false
        default: "false"

env:
  PYTHON_VERSION: "3.10"

jobs:
  linter:
    name: "Lint Code"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 linter
        run: |
          echo "Running flake8 linter..."
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "Lint passed"

  validate:
    name: "Validate Model"
    runs-on: ubuntu-latest
    needs: linter

    # Branch protection + manual-intent gate (or manual dispatch)
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[run-train]'))

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_USER_TOKEN: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_EXPERIMENT_NAME: assignment6_pipeline

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn dagshub

      - name: Force train failure for demo
        if: github.event.inputs.force_train_fail == 'true'
        run: |
          echo "Simulating an out-of-memory error or code bug..."
          exit 1

      - name: Train model and log to MLflow
        if: github.event.inputs.force_train_fail != 'true'
        env:
          FORCE_ACCURACY: ${{ inputs.force_accuracy }}
        run: python train.py

      # ── Persist Run ID so the deploy job can find it ──────────
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v7
        with:
          name: model-info
          path: model_info.txt
          if-no-files-found: error

      # ── On failure: capture diagnostics and upload ────────────
      - name: Write error_logs.txt
        if: failure()
        run: |
          echo "=== TRAINING / VALIDATION FAILED ===" > error_logs.txt
          echo "Timestamp : $(date -u)"                >> error_logs.txt
          echo "Branch    : ${{ github.ref_name }}"    >> error_logs.txt
          echo "Commit SHA: ${{ github.sha }}"          >> error_logs.txt
          echo "Commit msg: ${{ github.event.head_commit.message }}" >> error_logs.txt
          echo "Runner OS : ${{ runner.os }}"           >> error_logs.txt
          echo ""                                       >> error_logs.txt
          echo "See the Actions log above for the full Python traceback." >> error_logs.txt

      - name: Upload error_logs.txt artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup temporary cloud volumes
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."


  deploy:
    name: "Deploy Model"
    runs-on: ubuntu-latest
    needs: validate

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_USER_TOKEN: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .


      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Build Docker image (mock)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          echo "docker build --build-arg RUN_ID=${RUN_ID} -t ml-model:${RUN_ID} ."
